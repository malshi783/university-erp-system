<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Attendance</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #71b7e6, #9b59b6);
            padding: 40px;
            display: flex;
            justify-content: center;
        }
        .table-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 800px;
        }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #9b59b6; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .back-link { display: block; margin-top: 20px; text-align: center; color: #9b59b6; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
<div class="table-container">
    <h2>Attendance Records</h2>
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Student ID</th>
            <th>Date</th>
            <th>Status</th>
        </tr>
        </thead>
        <tbody id="attendanceTableBody">
        </tbody>
    </table>
    <a href="attendance.html" class="back-link">← Back to Mark Attendance</a>
</div>

<script>
    // Fetch data from backend when DOM contents are loaded
    window.addEventListener('DOMContentLoaded', () => {
        fetch('/api/attendance')
            .then(response => response.json())
            .then(data => {
                const tableBody = document.getElementById('attendanceTableBody');
                tableBody.innerHTML = '';

                data.forEach(record => {
                    const row = `<tr>
                        <td>${record.id || '-'}</td>
                        <td>${record.studentId || record.student_id || '-'}</td>
                        <td>${record.date || '-'}</td>
                        <td>${record.status || '-'}</td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });
            })
            .catch(error => console.error('Error fetching data:', error));
    });
</script>
</body>
</html>
