<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-container">
    <div class="login-box">
        <h2>Mark Attendance</h2>
        <p>Enter details to submit daily attendance.</p>

        <form id="attendanceForm">
            <div class="input-group">
                <label for="studentId">Student ID / Reg No</label>
                <input type="text" id="studentId" placeholder="e.g. SE/2021/001" required>
            </div>

            <div class="input-group">
                <label for="date">Date</label>
                <input type="date" id="date" required>
            </div>

            <div class="input-group">
                <label for="status">Status</label>
                <select id="status" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; outline: none;" required>
                    <option value="Present">Present</option>
                    <option value="Absent">Absent</option>
                </select>
            </div>

            <button type="submit" class="btn-login">Submit Attendance</button>
        </form>
        <p id="response-msg" style="margin-top: 15px; font-weight: bold; color: green;"></p>
        <br>
        <a href="view-attendance.html" style="color: #9b59b6; text-decoration: none; font-size: 14px; font-weight: bold;">View Attendance List →</a>
    </div>
</div>

<script>
    document.getElementById('attendanceForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const studentId = document.getElementById('studentId').value;
        const date = document.getElementById('date').value;
        const status = document.getElementById('status').value;
        const responseMsg = document.getElementById('response-msg');

        // Send data to backend API
        fetch('/api/attendance', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                studentId: studentId,
                date: date,
                status: status
            })
        })
        .then(response => response.json())
        .then(data => {
            responseMsg.style.color = "green";
            responseMsg.textContent = "Attendance marked successfully!";
            document.getElementById('attendanceForm').reset();
        })
        .catch(error => {
            responseMsg.style.color = "red";
            responseMsg.textContent = "Error saving attendance!";
            console.error('Error:', error);
        });
    });
</script>
</body>
</html>
